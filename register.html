<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — Keheilan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a110c;--surface:#1a2b1e;--border:rgba(74,222,128,.12);--accent:#4ade80;--accent2:#86efac;--muted:#6b7c70;--text:#e8f0e9;--text2:#a8bfac;--danger:#f87171;--radius:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
nav{padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;color:var(--bg);font-size:14px;}
.logo-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--text);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;}
.card-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;margin-bottom:8px;}
.card-sub{font-size:14px;color:var(--text2);font-weight:300;margin-bottom:36px;}

/* Role selector */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
.role-card{border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:.2s;text-align:left;}
.role-card:hover{border-color:rgba(74,222,128,.3);}
.role-card.selected{border-color:var(--accent);background:rgba(74,222,128,.06);}
.role-card h4{font-size:14px;font-weight:500;margin-bottom:4px;}
.role-card p{font-size:12px;color:var(--text2);font-weight:300;line-height:1.5;}
.role-icon{font-size:20px;margin-bottom:10px;}

.field{margin-bottom:20px;}
.field label{display:block;font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:.2s;}
.field input:focus{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.03);}
.field input::placeholder{color:var(--muted);}
.btn{width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:.2s;margin-top:8px;}
.btn:hover{background:var(--accent2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--danger);border-radius:var(--radius);padding:12px 16px;font-size:13px;margin-bottom:20px;display:none;}
.footer-link{text-align:center;margin-top:28px;font-size:13px;color:var(--text2);}
.footer-link a{color:var(--accent);text-decoration:none;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(10,17,12,.3);border-top-color:var(--bg);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">
    <div class="logo-mark">K</div>
    <div class="logo-name">Keheilan</div>
  </a>
</nav>

<main>
  <div class="card">
    <h1 class="card-title">Create your account</h1>
    <p class="card-sub">Choose your role to get started</p>

    <div class="role-grid">
      <div class="role-card selected" id="role-investor" onclick="selectRole('investor')">
        <div class="role-icon">📈</div>
        <h4>Investor</h4>
        <p>Browse deals, invest capital, track portfolio</p>
      </div>
      <div class="role-card" id="role-operator" onclick="selectRole('operator')">
        <div class="role-icon">🌾</div>
        <h4>Farm Operator</h4>
        <p>List farms, raise capital, submit reports</p>
      </div>
    </div>

    <div class="error" id="err"></div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="full_name" placeholder="Ahmed Al-Rashid" autocomplete="name"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"/>
    </div>

    <button class="btn" id="btn" onclick="doRegister()">Create Account</button>

    <div class="footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</main>

<script>
const API = '';
let selectedRole = 'investor';

// Pre-select role from query string
const params = new URLSearchParams(location.search);
if (params.get('role') === 'operator') selectRole('operator');

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-investor').classList.toggle('selected', role === 'investor');
  document.getElementById('role-operator').classList.toggle('selected', role === 'operator');
}

async function doRegister() {
  const full_name = document.getElementById('full_name').value.trim();
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value;
  const err       = document.getElementById('err');
  const btn       = document.getElementById('btn');

  err.style.display = 'none';
  if (!full_name || !email || !password) {
    err.textContent = 'All fields are required.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';

  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({full_name, email, password, role: selectedRole})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');

    localStorage.setItem('kh_token', data.token);
    localStorage.setItem('kh_role', data.user.role);
    localStorage.setItem('kh_user', JSON.stringify(data.user));

    if (selectedRole === 'investor') location.href = '/investor';
    else location.href = '/operator';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
